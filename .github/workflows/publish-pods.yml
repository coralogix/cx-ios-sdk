name: Publish CocoaPods

permissions:
  contents: read

on:
  release:
    types: [published]

jobs:
  publish-pods:
    runs-on: macos-latest
    env:
      COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
      TAG_RAW: ${{ github.event.release.tag_name || github.ref_name }}

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x ./verify_podspec_versions.sh

      - name: Verify release tag matches podspec versions
        run: |
          set -euo pipefail
          echo "Using tag: ${TAG_RAW}"
          ./verify_podspec_versions.sh "${TAG_RAW}"

      # Set up Ruby (required for CocoaPods)
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Specify a Ruby version compatible with CocoaPods
          bundler-cache: true

      # Install CocoaPods
      - name: Install CocoaPods
        run: gem install cocoapods

      # Set up CocoaPods Trunk authentication
      - name: Authenticate with CocoaPods Trunk
        run: |
          set -euo pipefail
          if [ -z "${COCOAPODS_TRUNK_TOKEN:-}" ]; then
            echo "::error::COCOAPODS_TRUNK_TOKEN secret is missing. Add it in Settings → Secrets and variables → Actions."
            echo "See .github/COCOAPODS_TRUNK_SETUP.md for step-by-step setup."
            exit 1
          fi
          echo "Validating CocoaPods Trunk token..."
          if ! pod trunk me; then
            echo "::error::CocoaPods Trunk token is invalid or unverified. Update the COCOAPODS_TRUNK_TOKEN secret."
            echo "Fix: run 'pod trunk register EMAIL Name', verify the email link, then get the token from ~/.netrc and set it in GitHub Secrets."
            echo "See .github/COCOAPODS_TRUNK_SETUP.md for full instructions."
            exit 1
          fi

      # Push CoralogixInternal.podspec
      - name: Push CoralogixInternal.podspec
        run: |
          set -euo pipefail
          echo "Target version: ${TAG_RAW}"
          # Escape the tag for literal use in the version-match regexes below
          # (a bare semver like 2.10.0 contains regex-special dots).
          TAG_RE=$(printf '%s' "$TAG_RAW" | sed 's/[^[:alnum:]]/\\&/g')
          # `pod trunk info` and the CDN spec index lag the actual registration by
          # seconds to minutes, so checking once right after a push races propagation
          # and reports a false failure even when the spec already landed server-side
          # (the GitHub commit API frequently times out client-side after the push
          # succeeds). Poll instead of checking once; return 0 as soon as it appears.
          landed_on_trunk() {
            local pod="$1"
            local tries=6
            local delay=30
            local i=1
            while :; do
              if pod trunk info "$pod" | grep -Eq "^[[:space:]]*-[[:space:]]*${TAG_RE}([[:space:]]|\(|$)"; then
                return 0
              fi
              if [ "$i" -ge "$tries" ]; then
                return 1
              fi
              echo "⏳ ${pod} ${TAG_RAW} not on Trunk yet (check ${i}/${tries}); waiting ${delay}s for propagation..."
              sleep "$delay"
              i=$((i + 1))
            done
          }
          if pod trunk info CoralogixInternal | grep -Eq "^[[:space:]]*-[[:space:]]*${TAG_RE}([[:space:]]|\(|$)"; then
            echo "ℹ️  CoralogixInternal ${TAG_RAW} already on Trunk. Skipping push."
          else
            echo "🚀 Pushing CoralogixInternal.podspec..."
            set +e
            push_output=$(pod trunk push CoralogixInternal.podspec --allow-warnings --skip-tests --synchronous --verbose 2>&1)
            push_exit_code=$?
            set -e
            
            if [ $push_exit_code -eq 0 ]; then
              echo "✅ CoralogixInternal.podspec pushed!"
            elif echo "$push_output" | grep -q "Unable to accept duplicate entry"; then
              echo "⚠️ Duplicate entry detected for CoralogixInternal (already on Trunk)."
            elif landed_on_trunk CoralogixInternal; then
              # A client-side failure (e.g. "Calling the GitHub commit API timed out")
              # frequently still lands the spec server-side. Trust Trunk, not the exit code.
              echo "✅ CoralogixInternal ${TAG_RAW} is on Trunk — push landed despite a client error."
            else
              echo "❌ Error pushing CoralogixInternal.podspec:"
              echo "$push_output"
              exit 1
            fi

            # CoralogixInternal is on Trunk now — fresh push, duplicate, or a client
            # error that still landed server-side. SessionReplay/Coralogix depend on it,
            # so wait for it to become available and refresh the local CDN cache before
            # proceeding, regardless of which branch above confirmed it. (The genuine
            # error case already exited.)
            echo "⏳ Waiting for CoralogixInternal to be available in CocoaPods Specs..."
            timeout=1800
            elapsed=0
            until pod trunk info CoralogixInternal | grep -Eq "^[[:space:]]*-[[:space:]]*${TAG_RE}([[:space:]]|\(|$)"; do
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "❌ Timeout: CoralogixInternal not available after $timeout seconds."
                exit 1
              fi
              echo "⏳ CoralogixInternal not yet available, waiting 30 seconds..."
              sleep 30
              elapsed=$((elapsed + 30))
            done
            echo "✅ CoralogixInternal is now available on trunk. Updating local CDN cache..."
            pod repo update
            echo "✅ Local CDN cache updated."
          fi

      # Clear CocoaPods cache
      - name: Clear CocoaPods cache
        run: |
          echo "🧹 Clearing CocoaPods cache..."
          pod cache clean --all
          echo "✅ Cache cleared."
          
      # Push SessionReplay.podspec
      - name: Push SessionReplay.podspec
        run: |
          set -euo pipefail
          echo "Target version: ${TAG_RAW}"
          # Escape the tag for literal use in the version-match regexes below
          # (a bare semver like 2.10.0 contains regex-special dots).
          TAG_RE=$(printf '%s' "$TAG_RAW" | sed 's/[^[:alnum:]]/\\&/g')
          # `pod trunk info` and the CDN spec index lag the actual registration by
          # seconds to minutes, so checking once right after a push races propagation
          # and reports a false failure even when the spec already landed server-side
          # (the GitHub commit API frequently times out client-side after the push
          # succeeds). Poll instead of checking once; return 0 as soon as it appears.
          landed_on_trunk() {
            local pod="$1"
            local tries=6
            local delay=30
            local i=1
            while :; do
              if pod trunk info "$pod" | grep -Eq "^[[:space:]]*-[[:space:]]*${TAG_RE}([[:space:]]|\(|$)"; then
                return 0
              fi
              if [ "$i" -ge "$tries" ]; then
                return 1
              fi
              echo "⏳ ${pod} ${TAG_RAW} not on Trunk yet (check ${i}/${tries}); waiting ${delay}s for propagation..."
              sleep "$delay"
              i=$((i + 1))
            done
          }
          if pod trunk info SessionReplay | grep -Eq "^[[:space:]]*-[[:space:]]*${TAG_RE}([[:space:]]|\(|$)"; then
            echo "ℹ️ SessionReplay ${TAG_RAW} already on Trunk. Skipping push."
          else
            echo "🚀 Pushing SessionReplay.podspec..."
            max_attempts=6
            retry_sleep_seconds=60
            attempt=1
            pushed=false

            while [ "$attempt" -le "$max_attempts" ]; do
              echo "📦 SessionReplay push attempt ${attempt}/${max_attempts}..."
              set +e
              push_output=$(pod trunk push SessionReplay.podspec --allow-warnings --skip-tests --synchronous --verbose 2>&1)
              push_exit_code=$?
              set -e

              if [ $push_exit_code -eq 0 ]; then
                echo "✅ SessionReplay.podspec pushed!"
                pushed=true
                break
              fi

              if echo "$push_output" | grep -q "Unable to accept duplicate entry"; then
                echo "⚠️ Duplicate entry detected for SessionReplay, skipping to next phase..."
                pushed=true
                break
              fi

              # A client-side failure (e.g. "Calling the GitHub commit API timed out")
              # frequently still lands the spec server-side. Trust Trunk, not the exit code.
              if landed_on_trunk SessionReplay; then
                echo "✅ SessionReplay ${TAG_RAW} is on Trunk — push landed despite a client error."
                pushed=true
                break
              fi

              # Retry on CDN/spec propagation lag AND transient Trunk/GitHub failures
              # (the GitHub commit API times out intermittently mid-push).
              if echo "$push_output" | grep -Eq "Unable to find a specification for|None of your spec sources contain|required by|GitHub commit API timed out|timed out|Timeout|50[234]|Net::|Connection reset|getaddrinfo"; then
                if [ "$attempt" -lt "$max_attempts" ]; then
                  echo "⏳ Not resolvable yet (CDN propagation or transient Trunk/GitHub error). Retrying in ${retry_sleep_seconds}s..."
                  sleep "$retry_sleep_seconds"
                  attempt=$((attempt + 1))
                  continue
                fi
              fi

              echo "❌ Error pushing SessionReplay.podspec:"
              echo "$push_output"
              exit 1
            done

            if [ "$pushed" != "true" ]; then
              echo "❌ SessionReplay.podspec push failed after ${max_attempts} attempts."
              exit 1
            fi
          fi

      # Push Coralogix.podspec
      - name: Push Coralogix.podspec
        run: |
          set -euo pipefail
          echo "Target version: ${TAG_RAW}"
          # Escape the tag for literal use in the version-match regexes below
          # (a bare semver like 2.10.0 contains regex-special dots).
          TAG_RE=$(printf '%s' "$TAG_RAW" | sed 's/[^[:alnum:]]/\\&/g')
          # `pod trunk info` and the CDN spec index lag the actual registration by
          # seconds to minutes, so checking once right after a push races propagation
          # and reports a false failure even when the spec already landed server-side
          # (the GitHub commit API frequently times out client-side after the push
          # succeeds). Poll instead of checking once; return 0 as soon as it appears.
          landed_on_trunk() {
            local pod="$1"
            local tries=6
            local delay=30
            local i=1
            while :; do
              if pod trunk info "$pod" | grep -Eq "^[[:space:]]*-[[:space:]]*${TAG_RE}([[:space:]]|\(|$)"; then
                return 0
              fi
              if [ "$i" -ge "$tries" ]; then
                return 1
              fi
              echo "⏳ ${pod} ${TAG_RAW} not on Trunk yet (check ${i}/${tries}); waiting ${delay}s for propagation..."
              sleep "$delay"
              i=$((i + 1))
            done
          }
          if pod trunk info Coralogix | grep -Eq "^[[:space:]]*-[[:space:]]*${TAG_RE}([[:space:]]|\(|$)"; then
            echo "ℹ️ Coralogix ${TAG_RAW} already on Trunk. Skipping push."
          else
            echo "🚀 Pushing Coralogix.podspec..."
            max_attempts=6
            retry_sleep_seconds=60
            attempt=1
            pushed=false

            while [ "$attempt" -le "$max_attempts" ]; do
              echo "📦 Coralogix push attempt ${attempt}/${max_attempts}..."
              set +e
              push_output=$(pod trunk push Coralogix.podspec --allow-warnings --skip-tests --synchronous --verbose 2>&1)
              push_exit_code=$?
              set -e

              if [ $push_exit_code -eq 0 ]; then
                echo "🎉 Coralogix.podspec pushed successfully! 🎉"
                pushed=true
                break
              fi

              if echo "$push_output" | grep -q "Unable to accept duplicate entry"; then
                echo "⚠️ Duplicate entry detected for Coralogix, skipping..."
                pushed=true
                break
              fi

              # A client-side failure (e.g. "Calling the GitHub commit API timed out")
              # frequently still lands the spec server-side. Trust Trunk, not the exit code.
              if landed_on_trunk Coralogix; then
                echo "✅ Coralogix ${TAG_RAW} is on Trunk — push landed despite a client error."
                pushed=true
                break
              fi

              # Retry on CDN/spec propagation lag AND transient Trunk/GitHub failures
              # (the GitHub commit API times out intermittently mid-push).
              if echo "$push_output" | grep -Eq "Unable to find a specification for|None of your spec sources contain|required by|GitHub commit API timed out|timed out|Timeout|50[234]|Net::|Connection reset|getaddrinfo"; then
                if [ "$attempt" -lt "$max_attempts" ]; then
                  echo "⏳ Not resolvable yet (CDN propagation or transient Trunk/GitHub error). Retrying in ${retry_sleep_seconds}s..."
                  sleep "$retry_sleep_seconds"
                  attempt=$((attempt + 1))
                  continue
                fi
              fi

              echo "❌ Error pushing Coralogix.podspec:"
              echo "$push_output"
              exit 1
            done

            if [ "$pushed" != "true" ]; then
              echo "❌ Coralogix.podspec push failed after ${max_attempts} attempts."
              exit 1
            fi
          fi
